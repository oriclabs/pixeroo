<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snaproo</title>
  <link rel="stylesheet" href="../styles/shared.css">
  <style>
    body { width: 320px; }
    .hero-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.375rem; flex: 1; padding: 1rem 0.5rem; background: var(--slate-800); border: 1px solid var(--slate-700); border-radius: 12px; color: var(--slate-300); cursor: pointer; transition: all 0.15s; }
    .hero-btn:hover { border-color: #F4C430; color: #F4C430; }
    .hero-btn svg { opacity: 0.8; }
    .hero-btn:hover svg { opacity: 1; stroke: #F4C430; }
    .hero-btn-title { font-size: 0.8125rem; font-weight: 600; }
    .hero-btn-desc { font-size: 0.5625rem; color: var(--slate-400); }
    .qr-section { background: var(--slate-900); border: 1px solid var(--slate-800); border-radius: 12px; padding: 0.75rem; margin-bottom: 0.75rem; }
    .qr-label { font-size: 0.6875rem; font-weight: 600; color: var(--slate-400); text-transform: uppercase; letter-spacing: 0.05em; }
    .qr-copy { font-size: 0.6875rem; color: #F4C430; background: none; border: none; cursor: pointer; }
    .icon-btn { padding: 6px; border-radius: 6px; border: none; background: none; color: var(--slate-400); cursor: pointer; }
    .icon-btn:hover { color: #F4C430; }
    /* Quick settings */
    .qs-section { background: var(--slate-900); border: 1px solid var(--slate-800); border-radius: 12px; padding: 0.5rem 0.75rem; margin-bottom: 0.75rem; }
    .qs-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
    .qs-header span { font-size: 0.6875rem; font-weight: 600; color: var(--slate-400); text-transform: uppercase; letter-spacing: 0.05em; }
    .qs-header .qs-toggle { color: var(--slate-400); font-size: 0.6rem; transition: transform 0.15s; }
    .qs-body { overflow: hidden; transition: max-height 0.2s ease; max-height: 0; }
    .qs-body.open { max-height: 300px; }
    .qs-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-top: 1px solid var(--slate-800); }
    .qs-row:first-child { border-top: none; }
    .qs-row-label { font-size: 0.7rem; color: var(--slate-300); }
    .qs-row select { background: var(--slate-800); color: var(--slate-200); border: 1px solid var(--slate-700); border-radius: 4px; padding: 2px 6px; font-size: 0.65rem; }
    .qs-toggle-sw { position: relative; width: 32px; height: 18px; cursor: pointer; flex-shrink: 0; }
    .qs-toggle-sw input { display: none; }
    .qs-toggle-sw .track { position: absolute; inset: 0; background: var(--slate-700); border-radius: 9px; transition: background 0.2s; }
    .qs-toggle-sw input:checked + .track { background: var(--saffron-400); }
    .qs-toggle-sw .thumb { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: white; border-radius: 50%; transition: transform 0.2s; }
    .qs-toggle-sw input:checked ~ .thumb { transform: translateX(14px); }
    .qs-advanced { display: block; text-align: center; font-size: 0.65rem; color: var(--slate-400); text-decoration: none; padding: 4px 0; cursor: pointer; transition: color 0.12s; }
    .qs-advanced:hover { color: var(--saffron-400); }
    /* Quick actions */
    .pqa-section { margin-bottom: 0.75rem; }
    .pqa-label { font-size: 0.65rem; font-weight: 600; color: var(--slate-400); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.375rem; }
    .pqa-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .pqa-btn { display: flex; align-items: center; gap: 4px; padding: 5px 9px; background: var(--slate-900); border: 1px solid var(--slate-800); border-radius: 7px; color: var(--slate-300); font-size: 0.65rem; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .pqa-btn:hover { border-color: #F4C430; color: #F4C430; background: rgba(244,196,48,0.04); }
    .pqa-btn svg { flex-shrink: 0; opacity: 0.7; }
    .pqa-btn:hover svg { opacity: 1; stroke: #F4C430; }
  </style>
</head>
<body class="bg-slate-950 text-gray-100 font-sans" style="padding:1rem;">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;">
    <div style="display:flex;align-items:center;gap:0.5rem;">
      <img src="../icons/icon32.png" width="28" height="28" alt="Snaproo" style="border-radius:6px;">
      <span style="font-size:1rem;font-weight:700;">Snaproo</span>
    </div>
    <button id="btn-help" class="icon-btn" title="Help">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </button>
  </div>

  <!-- Two main buttons -->
  <div style="display:flex;gap:0.75rem;margin-bottom:0.75rem;">
    <button id="btn-page-images" class="hero-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
      <span class="hero-btn-title">Page Images</span>
      <span class="hero-btn-desc">Browse, inspect, download</span>
    </button>
    <button id="btn-toolkit" class="hero-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span class="hero-btn-title">Toolkit</span>
      <span class="hero-btn-desc">Edit, convert, QR, colors, SVG</span>
    </button>
  </div>

  <!-- Quick Actions -->
  <div class="pqa-section">
    <div class="pqa-label">Quick Actions</div>
    <div class="pqa-row">
      <button class="pqa-btn" id="pqa-screenshot" title="Capture visible tab and open in editor"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 3v2M16 3v2M3 8h2M19 8h2"/></svg>Screenshot</button>
      <button class="pqa-btn" id="pqa-region" title="Select a region on the page to capture"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L2 6M2 2l4 4"/><path d="M18 22l4-4M22 22l-4-4"/><rect x="6" y="6" width="12" height="12" rx="1" stroke-dasharray="3 2"/></svg>Region</button>
      <button class="pqa-btn" id="pqa-color" title="Pick a color from the page"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 22l1-1h3l9-9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>Pick Color</button>
      <button class="pqa-btn" id="pqa-qr-page" title="QR code for this page URL"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>QR Page</button>
    </div>
  </div>

  <!-- QR for current page -->
  <div class="qr-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;">
      <span class="qr-label">QR for this page</span>
      <button id="btn-copy-qr" class="qr-copy">Copy</button>
    </div>
    <div style="background:#ffffff;border-radius:8px;padding:0.75rem;display:flex;align-items:center;justify-content:center;">
      <canvas id="qr-output" width="180" height="180"></canvas>
    </div>
    <p id="qr-url" style="font-size:0.6875rem;color:var(--slate-400);margin-top:0.5rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></p>
  </div>

  <!-- Quick Settings -->
  <div class="qs-section">
    <div class="qs-header" id="qs-header">
      <span>Quick Settings</span>
      <span class="qs-toggle" id="qs-arrow">&#9660;</span>
    </div>
    <div class="qs-body" id="qs-body">
      <div class="qs-row">
        <span class="qs-row-label">Theme</span>
        <select id="qs-theme">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
        </select>
      </div>
      <div class="qs-row">
        <span class="qs-row-label">Export format</span>
        <select id="qs-format">
          <option value="png">PNG</option>
          <option value="jpeg">JPEG</option>
          <option value="webp">WebP</option>
        </select>
      </div>
      <div class="qs-row">
        <span class="qs-row-label">QR error correction</span>
        <select id="qs-qr-ecc">
          <option value="L">Low</option>
          <option value="M">Medium</option>
          <option value="Q">Quartile</option>
          <option value="H">High</option>
        </select>
      </div>
      <div class="qs-row">
        <span class="qs-row-label">Side panel view</span>
        <select id="qs-view">
          <option value="tiles">Tiles</option>
          <option value="medium">Medium</option>
          <option value="large">Large</option>
          <option value="details">Details</option>
        </select>
      </div>
      <a class="qs-advanced" id="btn-advanced">Advanced Settings &rarr;</a>
    </div>
  </div>

  <!-- Footer -->
  <div style="text-align:center;">
    <span style="font-size:10px;color:var(--slate-400);">v0.1.0 &middot; 100% Offline</span>
  </div>

  <script src="../shared/theme.js"></script>
  <script src="../lib/qrcode-gen.js"></script>
  <script src="qr.js"></script>
  <script src="popup.js"></script>
</body>
</html>
