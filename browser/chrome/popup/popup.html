<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gazo</title>
  <link rel="stylesheet" href="../styles/shared.css">
  <style>
    body { width: 320px; }
    .hero-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.375rem; flex: 1; padding: 1rem 0.5rem; background: var(--slate-800); border: 1px solid var(--slate-700); border-radius: 12px; color: var(--slate-300); cursor: pointer; transition: all 0.15s; }
    .hero-btn:hover { border-color: #F4C430; color: #F4C430; }
    .hero-btn svg { opacity: 0.8; }
    .hero-btn:hover svg { opacity: 1; stroke: #F4C430; }
    .hero-btn-title { font-size: 0.85rem; font-weight: 600; }
    .hero-btn-desc { font-size: 0.65rem; color: var(--slate-400); }
    .qr-section { background: var(--slate-900); border: 1px solid var(--slate-800); border-radius: 12px; padding: 0.75rem; margin-bottom: 0.75rem; }
    .qr-label { font-size: 0.6875rem; font-weight: 600; color: var(--slate-400); text-transform: uppercase; letter-spacing: 0.05em; }
    .qr-copy { font-size: 0.6875rem; color: #F4C430; background: none; border: none; cursor: pointer; }
    .icon-btn { padding: 6px; border-radius: 6px; border: none; background: none; color: var(--slate-400); cursor: pointer; }
    .icon-btn:hover { color: #F4C430; }
    /* Quick settings */
    .qs-section { background: var(--slate-900); border: 1px solid var(--slate-800); border-radius: 12px; padding: 0.5rem 0.75rem; margin-bottom: 0.75rem; }
    .qs-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
    .qs-header span { font-size: 0.6875rem; font-weight: 600; color: var(--slate-400); text-transform: uppercase; letter-spacing: 0.05em; }
    .qs-header .qs-toggle { color: var(--slate-400); font-size: 0.6rem; transition: transform 0.15s; }
    .qs-body { overflow: hidden; transition: max-height 0.2s ease; max-height: 0; }
    .qs-body.open { max-height: 300px; }
    .qs-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-top: 1px solid var(--slate-800); }
    .qs-row:first-child { border-top: none; }
    .qs-row-label { font-size: 0.725rem; color: var(--slate-300); }
    .qs-row select { background: var(--slate-800); color: var(--slate-200); border: 1px solid var(--slate-700); border-radius: 4px; padding: 2px 6px; font-size: 0.7rem; }
    .qs-toggle-sw { position: relative; width: 32px; height: 18px; cursor: pointer; flex-shrink: 0; }
    .qs-toggle-sw input { display: none; }
    .qs-toggle-sw .track { position: absolute; inset: 0; background: var(--slate-700); border-radius: 9px; transition: background 0.2s; }
    .qs-toggle-sw input:checked + .track { background: var(--saffron-400); }
    .qs-toggle-sw .thumb { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: white; border-radius: 50%; transition: transform 0.2s; }
    .qs-toggle-sw input:checked ~ .thumb { transform: translateX(14px); }
    .qs-advanced { display: block; text-align: center; font-size: 0.7rem; color: var(--slate-400); text-decoration: none; padding: 4px 0; cursor: pointer; transition: color 0.12s; }
    .qs-advanced:hover { color: var(--saffron-400); }
    /* Quick actions */
    .pqa-section { margin-bottom: 0.75rem; }
    .pqa-label { font-size: 0.7rem; font-weight: 600; color: var(--slate-400); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.375rem; }
    .pqa-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .pqa-btn { display: flex; align-items: center; gap: 4px; padding: 5px 9px; background: var(--slate-900); border: 1px solid var(--slate-800); border-radius: 7px; color: var(--slate-300); font-size: 0.7rem; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .pqa-btn:hover { border-color: #F4C430; color: #F4C430; background: rgba(244,196,48,0.04); }
    .pqa-btn svg { flex-shrink: 0; opacity: 0.7; }
    .pqa-btn:hover svg { opacity: 1; stroke: #F4C430; }
  </style>
</head>
<body class="bg-slate-950 text-gray-100 font-sans" style="padding:1rem;">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;">
    <div style="display:flex;align-items:center;gap:0.5rem;">
      <img src="../icons/icon32.png" width="28" height="28" alt="Gazo" style="border-radius:6px;">
      <span style="font-size:1rem;font-weight:700;">Gazo</span>
    </div>
    <div style="display:flex;align-items:center;gap:4px;">
      <div style="position:relative;">
        <button id="btn-gear" class="icon-btn" title="Quick Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <div id="gear-dropdown" style="display:none;position:absolute;top:100%;right:0;z-index:100;margin-top:4px;background:var(--slate-900);border:1px solid var(--slate-700);border-radius:10px;box-shadow:0 12px 36px rgba(0,0,0,0.5);padding:8px 12px;width:220px;">
          <div class="qs-row">
            <span class="qs-row-label">Theme</span>
            <select id="qs-theme"><option value="dark">Dark</option><option value="light">Light</option></select>
          </div>
          <div class="qs-row">
            <span class="qs-row-label">Export format</span>
            <select id="qs-format"><option value="png">PNG</option><option value="jpeg">JPEG</option><option value="webp">WebP</option></select>
          </div>
          <div class="qs-row">
            <span class="qs-row-label">QR correction</span>
            <select id="qs-qr-ecc"><option value="L">Low</option><option value="M">Medium</option><option value="Q">Quartile</option><option value="H">High</option></select>
          </div>
          <div class="qs-row">
            <span class="qs-row-label">Panel view</span>
            <select id="qs-view"><option value="tiles">Tiles</option><option value="medium">Medium</option><option value="large">Large</option><option value="details">Details</option></select>
          </div>
          <a class="qs-advanced" id="btn-advanced">Advanced Settings &rarr;</a>
        </div>
      </div>
      <button id="btn-faq" class="icon-btn" title="Which tool should I use?">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01"/><circle cx="12" cy="12" r="10"/></svg>
      </button>
      <button id="btn-help" class="icon-btn" title="Help">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      </button>
    </div>
  </div>

  <!-- Two main buttons -->
  <div style="display:flex;gap:0.75rem;margin-bottom:0.75rem;">
    <button id="btn-page-images" class="hero-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
      <span class="hero-btn-title">Page Images</span>
      <span class="hero-btn-desc">Browse, inspect, download</span>
    </button>
    <button id="btn-toolkit" class="hero-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span class="hero-btn-title">Toolkit</span>
      <span class="hero-btn-desc">Edit, convert, QR, colors, SVG</span>
    </button>
  </div>

  <!-- Quick Actions -->
  <div class="pqa-section">
    <div class="pqa-label">Quick Actions</div>
    <div class="pqa-row">
      <button class="pqa-btn" id="pqa-screenshot" title="Capture visible tab and open in editor"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 3v2M16 3v2M3 8h2M19 8h2"/></svg>Screenshot</button>
      <button class="pqa-btn" id="pqa-region" title="Select a region on the page to capture"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L2 6M2 2l4 4"/><path d="M18 22l4-4M22 22l-4-4"/><rect x="6" y="6" width="12" height="12" rx="1" stroke-dasharray="3 2"/></svg>Region</button>
      <button class="pqa-btn" id="pqa-fullpage" title="Capture entire scrollable page"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 18l3-3 3 3"/><line x1="12" y1="15" x2="12" y2="8"/></svg>Full Page</button>
      <button class="pqa-btn" id="pqa-color" title="Pick a color from the page"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 22l1-1h3l9-9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>Pick Color</button>
      <button class="pqa-btn" id="pqa-paste" title="Open editor with clipboard image (Ctrl+V)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>Paste</button>
      <button class="pqa-btn" id="pqa-library" title="Open your saved image library"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>Library</button>
      <button class="pqa-btn" id="pqa-draw" title="Open blank drawing canvas"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l4-4 4 4 4-8 4 4"/><line x1="3" y1="21" x2="21" y2="21"/></svg>Draw</button>
    </div>
  </div>

  <!-- QR for current page -->
  <div class="qr-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;">
      <span class="qr-label">QR for this page</span>
      <button id="btn-copy-qr" class="qr-copy">Copy</button>
    </div>
    <div style="background:#ffffff;border-radius:8px;padding:0.75rem;display:flex;align-items:center;justify-content:center;">
      <canvas id="qr-output" width="180" height="180"></canvas>
    </div>
    <p style="font-size:0.6875rem;color:var(--slate-500);margin-top:0.5rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-1px;margin-right:3px;"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg><span id="qr-url" style="color:var(--slate-400);"></span></p>
  </div>


  <!-- Footer -->
  <div style="text-align:center;">
    <span style="font-size:10px;color:var(--slate-400);">v0.1.0 &middot; 100% Offline</span>
  </div>

  <script src="../shared/theme.js"></script>
  <script src="../lib/qrcode-gen.js"></script>
  <script src="qr.js"></script>
  <script src="popup.js"></script>
</body>
</html>
