<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixeroo</title>
  <link rel="stylesheet" href="../styles/shared.css">
  <style>
    body { width: 320px; }
    .hero-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.375rem; flex: 1; padding: 1rem 0.5rem; background: var(--slate-800); border: 1px solid var(--slate-700); border-radius: 12px; color: var(--slate-300); cursor: pointer; transition: all 0.15s; }
    .hero-btn:hover { border-color: #F4C430; color: #F4C430; }
    .hero-btn svg { opacity: 0.8; }
    .hero-btn:hover svg { opacity: 1; stroke: #F4C430; }
    .hero-btn-title { font-size: 0.8125rem; font-weight: 600; }
    .hero-btn-desc { font-size: 0.5625rem; color: var(--slate-500); }
    .qr-section { background: var(--slate-900); border: 1px solid var(--slate-800); border-radius: 12px; padding: 0.75rem; margin-bottom: 1rem; }
    .qr-label { font-size: 0.6875rem; font-weight: 600; color: var(--slate-400); text-transform: uppercase; letter-spacing: 0.05em; }
    .qr-copy { font-size: 0.6875rem; color: #F4C430; background: none; border: none; cursor: pointer; }
    .icon-btn { padding: 6px; border-radius: 6px; border: none; background: none; color: var(--slate-400); cursor: pointer; }
    .icon-btn:hover { color: #F4C430; }
  </style>
</head>
<body class="bg-slate-950 text-gray-100 font-sans" style="padding:1rem;">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
    <div style="display:flex;align-items:center;gap:0.5rem;">
      <div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#F4C430,#B8860B);display:flex;align-items:center;justify-content:center;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2A1E05" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
        </svg>
      </div>
      <span style="font-size:1rem;font-weight:700;">Pixeroo</span>
    </div>
    <div style="display:flex;align-items:center;gap:4px;">
      <button id="btn-settings" class="icon-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button id="btn-help" class="icon-btn" title="Help">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </button>
    </div>
  </div>

  <!-- QR for current page -->
  <div class="qr-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;">
      <span class="qr-label">QR for this page</span>
      <button id="btn-copy-qr" class="qr-copy">Copy</button>
    </div>
    <div style="background:#ffffff;border-radius:8px;padding:0.75rem;display:flex;align-items:center;justify-content:center;">
      <canvas id="qr-output" width="180" height="180"></canvas>
    </div>
    <p id="qr-url" style="font-size:0.6875rem;color:var(--slate-500);margin-top:0.5rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></p>
  </div>

  <!-- Two main buttons -->
  <div style="display:flex;gap:0.75rem;margin-bottom:1rem;">
    <button id="btn-page-images" class="hero-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
      <span class="hero-btn-title">Page Images</span>
      <span class="hero-btn-desc">Browse, inspect, download</span>
    </button>
    <button id="btn-toolkit" class="hero-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span class="hero-btn-title">Toolkit</span>
      <span class="hero-btn-desc">Edit, convert, QR, colors, SVG</span>
    </button>
  </div>

  <!-- Footer -->
  <div style="text-align:center;">
    <span style="font-size:9px;color:var(--slate-500);">v0.1.0 &middot; 100% Offline &middot; <a href="#" id="link-help" style="color:var(--slate-400);text-decoration:none;">Help</a></span>
  </div>

  <script src="../shared/theme.js"></script>
  <script src="qr.js"></script>
  <script src="popup.js"></script>
</body>
</html>
